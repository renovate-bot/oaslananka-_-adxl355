name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── C ────────────────────────────────────────────────────────────────
  c:
    name: C (GCC)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: c
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake gcc
      - name: Configure
        run: cmake -S . -B build -DADXL355_BUILD_TESTS=ON -DADXL355_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ── C++ ──────────────────────────────────────────────────────────────
  cpp:
    name: C++ (GCC)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpp
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Build C core first
        run: |
          cmake -S ${{ github.workspace }}/c -B ${{ github.workspace }}/c/build \
            -DADXL355_BUILD_TESTS=OFF -DADXL355_BUILD_EXAMPLES=OFF
          cmake --build ${{ github.workspace }}/c/build
      - name: Configure C++
        run: >
          cmake -S . -B build
          -DADXL355_BUILD_TESTS=ON -DADXL355_BUILD_EXAMPLES=ON
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/c/build
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ── Python ────────────────────────────────────────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[dev]
      - name: Test
        run: python -m pytest -v

  # ── Rust ──────────────────────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Check
        run: cargo check --all-targets
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Test (no_std)
        run: cargo test --no-default-features

  # ── Node.js ───────────────────────────────────────────────────────────
  node:
    name: Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: node/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Type check
        run: npx tsc --noEmit

  # ── Go ────────────────────────────────────────────────────────────────
  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: go/go.sum
      - name: Test
        run: go test ./...

  # ── Cross-language consistency ────────────────────────────────────────
  consistency:
    name: Cross-language Consistency
    runs-on: ubuntu-latest
    needs: [c, cpp, python, rust, node, go]
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml
      - name: Validate spec YAML
        run: python spec/validate_spec.py
      - name: Check cross-language consistency
        run: python spec/check_language_consistency.py
